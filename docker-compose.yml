services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: neurovault_server
    ports:
      - "3001:3001"
    env_file:
      - apps/server/.env
    volumes:
      - vault_data:/app/data/vaults
      - upload_data:/app/uploads
    depends_on:
      - mongo
      - qdrant
      - redis
    restart: unless-stopped
    networks:
      - neurovault_network

  mongo:
    image: mongo:7
    container_name: neurovault_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - neurovault_network

  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: neurovault_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - neurovault_network

  redis:
    image: redis:7-alpine
    container_name: neurovault_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - neurovault_network

  neo4j:
    image: neo4j:5
    container_name: neurovault_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/68013f12feffae32916cd0f30fcbcac4
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    networks:
      - neurovault_network

  nginx:
    image: nginx:alpine
    container_name: neurovault_gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/api_conf.d:/etc/nginx/api_conf.d:ro
      - ./infra/nginx/api_backends.conf:/etc/nginx/api_backends.conf:ro
      - ./infra/nginx/api_gateway.conf:/etc/nginx/api_gateway.conf:ro
      - ./infra/nginx/api_json_errors.conf:/etc/nginx/api_json_errors.conf:ro
      - ./infra/nginx/cors.conf:/etc/nginx/cors.conf:ro
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - neurovault_network

volumes:
  mongo_data:
  qdrant_data:
  neo4j_data:
  redis_data:
  vault_data:
  upload_data:

networks:
  neurovault_network:
    driver: bridge
