<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neurovault Extension Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Neurovault Capture</h1>

    <div class="field">
      <label for="api-url">Server URL</label>
      <input type="url" id="api-url" placeholder="https://your-server.com" />
    </div>

    <div class="field">
      <label for="secret">Admin Secret</label>
      <input type="password" id="secret" placeholder="Your ADMIN_SECRET" />
    </div>

    <div class="actions">
      <button id="save-btn">Save</button>
      <button id="test-btn">Test Connection</button>
    </div>

    <div id="status" class="status" hidden></div>

    <hr />

    <div class="field">
      <label>Quick Connect</label>
      <p class="hint">Paste a connect link from your Neurovault settings page:</p>
      <button id="paste-btn">Paste Connect Link</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
